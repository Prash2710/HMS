name: Backend CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'Backend_HMS/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'Backend_HMS/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build with Maven
        working-directory: Backend_HMS/Hospital_MS
        run: mvn clean package -DskipTests

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend Image
        working-directory: Backend_HMS/Hospital_MS
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/hms-backend:latest .
          docker push ghcr.io/${{ github.repository_owner }}/hms-backend:latest